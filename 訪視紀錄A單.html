
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>健康暨身體評估記錄單－試作版 v1</title>
  <style>
    * { box-sizing: border-box; font-family: "Microsoft JhengHei", Arial, sans-serif; }
    body { margin:0; background:#f4f7fb; color:#243043; }
    header { background:#2f6fed; color:white; padding:18px 24px; }
    header h1 { margin:0; font-size:26px; }
    header p { margin:6px 0 0; opacity:.95; }
    .container { max-width: 1280px; margin: 24px auto; padding: 0 16px 40px; }
    .card { background:white; border-radius:14px; box-shadow:0 4px 14px rgba(0,0,0,.08); padding:22px; margin-bottom:18px; }
    .section-title { margin:0 0 16px; font-size:20px; border-left:5px solid #2f6fed; padding-left:10px; }
    .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:14px; }
    .grid-2 { display:grid; grid-template-columns: repeat(2, 1fr); gap:14px; }
    .grid-3 { display:grid; grid-template-columns: repeat(3, 1fr); gap:14px; }
    .grid-5 { display:grid; grid-template-columns: repeat(5, 1fr); gap:14px; }
    .full { grid-column: 1 / -1; }
    label { display:block; font-weight:700; margin-bottom:6px; color:#28426e; }
    input, textarea, select { width:100%; border:1px solid #cfd7e6; border-radius:10px; padding:10px 12px; font-size:14px; background:#fff; }
    textarea { min-height: 88px; resize: vertical; }
    .subcard { background:#fbfcfe; border:1px solid #e3ebfa; border-radius:12px; padding:14px; }
    .hint { color:#667085; font-size:13px; margin-top:6px; }
    .table-like { width:100%; border-collapse:collapse; }
    .table-like th, .table-like td { border:1px solid #dce5f3; padding:10px; vertical-align:top; }
    .table-like th { background:#f6f9ff; text-align:left; color:#28426e; width:220px; }
    .pill-row { display:flex; flex-wrap:wrap; gap:10px; }
    .pill { background:#eef4ff; border:1px solid #cfe0ff; color:#274b88; border-radius:999px; padding:6px 12px; font-size:13px; }
    .sticky-note { position: sticky; top: 16px; margin-left: auto; width: 320px; background:#fffdf7; border:1px solid #f0d98c; border-radius:12px; padding:14px 16px; box-shadow:0 4px 12px rgba(0,0,0,.05); }
    .sticky-note h3 { margin:0 0 10px; font-size:16px; color:#7a5b00; }
    .summary-line { margin:6px 0; line-height:1.6; }
    .signature-box { min-height: 72px; background:#fbfcfe; border:1px dashed #bfd0f7; border-radius:12px; }
    @media (max-width: 1024px) {
      .grid, .grid-5 { grid-template-columns: repeat(2, 1fr); }
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .grid, .grid-2, .grid-3, .grid-5 { grid-template-columns: 1fr; }
      .sticky-note { width:100%; position:static; margin-bottom:16px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>健康暨身體評估記錄單－試作版 v1</h1>
    <p>依照表單 A / 表單 B 先整理成可直接開啟測試的網頁版。</p>
  </header>

  <div style="max-width:1280px; margin:18px auto 0; padding:0 16px;">
    <div style="background:#fff; border-radius:14px; box-shadow:0 4px 14px rgba(0,0,0,.08); padding:14px 18px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
      <a href="第一頁個案資料.html" style="border:1px solid #cfe0ff; background:#eef4ff; color:#2f6fed; border-radius:10px; padding:8px 16px; font-weight:700; text-decoration:none;">← 返回基本資料</a>
      <button onclick="saveForm()" style="border:none; background:#2f6fed; color:#fff; border-radius:10px; padding:8px 16px; font-weight:700; cursor:pointer;">儲存</button>
      <span id="saveMsg" style="color:#2a7a2a; font-weight:700; display:none;">已儲存 ✓</span>
    </div>
  </div>

  <div class="container">
    <div class="sticky-note">
      <h3>這份先做的方向</h3>
      <div class="summary-line">1. 先把 A、B 單內容整理成可輸入表單</div>
      <div class="summary-line">2. 版型延續你 v4 的卡片風格</div>
      <div class="summary-line">3. 後續可再接首頁、儲存、列印</div>
    </div>

    <div class="card">
      <h2 class="section-title">個案基本資料</h2>
      <div class="grid">
        <div><label>姓名</label><input value="林王勸"></div>
        <div><label>病歷號</label><input value="000262"></div>
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">表單 A｜個案健康狀況與身體評估暨訪視記錄</h2>
      <div class="subcard" style="margin-bottom:16px;">
        <div class="pill-row">
          <span class="pill">意識</span>
          <span class="pill">記憶能力</span>
          <span class="pill">情緒</span>
          <span class="pill">溝通能力</span>
          <span class="pill">生命徵象</span>
          <span class="pill">呼吸</span>
          <span class="pill">營養</span>
          <span class="pill">排泄</span>
          <span class="pill">皮膚</span>
          <span class="pill">睡眠</span>
        </div>
      </div>

      <table class="table-like">
        <tr><th>意識狀態</th><td><select><option value="">請選擇</option><option>清醒警覺</option><option>躁動</option><option>人時地混淆</option><option>譫妄</option><option>木僵</option><option>植物人狀態</option><option>昏迷</option><option>其他</option></select></td></tr>
        <tr><th>記憶能力</th><td><div style="display:flex; flex-wrap:wrap; gap:12px;"><label style="font-weight:normal; display:flex; align-items:center; gap:4px;"><input type="checkbox" style="width:auto;">正常</label><label style="font-weight:normal; display:flex; align-items:center; gap:4px;"><input type="checkbox" style="width:auto;">近期記憶退化</label><label style="font-weight:normal; display:flex; align-items:center; gap:4px;"><input type="checkbox" style="width:auto;">中期記憶退化</label><label style="font-weight:normal; display:flex; align-items:center; gap:4px;"><input type="checkbox" style="width:auto;">遠期記憶退化</label><label style="font-weight:normal; display:flex; align-items:center; gap:4px;"><input type="checkbox" style="width:auto;">無法評估</label></div></td></tr>
        <tr><th>情緒</th><td><select><option value="">請選擇</option><option>平穩</option><option>憂鬱</option><option>焦慮</option><option>無法評估</option></select></td></tr>
        <tr><th>溝通能力</th><td><div class="grid-2"><div><label>能理解</label><select><option value="">請選擇</option><option>能</option><option>否</option></select></div><div><label>能表達</label><select><option value="">請選擇</option><option>語言</option><option>肢體</option><option>輔具</option><option>否</option></select></div></div></td></tr>
        <tr><th>生命徵象</th><td><div class="grid-5"><div><label>體溫 (°C)</label><input></div><div><label>脈搏 (次/分鐘)</label><input></div><div><label>呼吸 (次/分鐘)</label><input></div><div><label>血壓 (mmHg)</label><input placeholder="例如 120/80"></div><div><label>血氧濃度 (%)</label><input></div></div></td></tr>
        <tr><th>呼吸</th><td><div class="grid-2"><div><label>呼吸方式</label><select><option value="">請選擇</option><option>自行呼吸</option><option>使用氧氣</option><option>使用呼吸器</option></select></div><div><label>使用呼吸輔助肌</label><select><option value="">請選擇</option><option>無</option><option>有</option></select></div><div><label>部位</label><input placeholder="若有請填寫"></div><div><label>呼吸音</label><input></div><div class="full"><label>痰液性狀</label><input></div></div></td></tr>
        <tr><th>營養</th><td><div class="grid-3"><div><label>吞嚥能力</label><select><option value="">請選擇</option><option>平順無嗆咳</option><option>偶嗆（＜3次/天）</option><option>常嗆（＞3次/天）</option><option>無吞嚥能力</option></select></div><div><label>進食途徑</label><select><option value="">請選擇</option><option>口</option><option>管路</option></select></div><div><label>管路說明</label><input placeholder="若有管路請填寫"></div><div class="full"><label>進食種類</label><select><option value="">請選擇</option><option>一般飲食</option><option>家屬調配</option><option>管灌配方</option></select></div></div></td></tr>
        <tr><th>排泄</th><td><div class="grid-3"><div><label>排尿方式</label><select><option value="">請選擇</option><option>自解</option><option>尿布尿套／便盆椅</option><option>尿管</option></select></div><div><label>尿液性狀</label><div style="display:flex; flex-wrap:wrap; gap:10px; padding-top:4px;"><label style="font-weight:normal; display:flex; align-items:center; gap:4px;"><input type="checkbox" style="width:auto;">清澈</label><label style="font-weight:normal; display:flex; align-items:center; gap:4px;"><input type="checkbox" style="width:auto;">混濁</label><label style="font-weight:normal; display:flex; align-items:center; gap:4px;"><input type="checkbox" style="width:auto;">色淺</label><label style="font-weight:normal; display:flex; align-items:center; gap:4px;"><input type="checkbox" style="width:auto;">色深</label><label style="font-weight:normal; display:flex; align-items:center; gap:4px;"><input type="checkbox" style="width:auto;">無沉澱</label><label style="font-weight:normal; display:flex; align-items:center; gap:4px;"><input type="checkbox" style="width:auto;">有沉澱</label></div></div><div><label>每日水分攝取量（cc/天）</label><input></div><div><label>腸音</label><input placeholder="例如 ＋＋ 正常"></div><div><label>處置</label><select><option value="">請選擇</option><option>自解</option><option>藥物</option><option>灌腸</option><option>挖便</option><option>造廔</option></select></div><div><label>糞便性狀</label><select><option value="">請選擇</option><option>正常</option><option>失禁</option><option>腹瀉</option><option>便秘</option></select></div></div></td></tr>
        <tr><th>皮膚</th><td><select><option value="">請選擇</option><option>完整</option><option>傷口（另寫評估紀錄暨護理計劃表）</option></select></td></tr>
        <tr><th>睡眠</th><td><select><option value="">請選擇</option><option>正常</option><option>失眠</option><option>日夜顛倒</option><option>睡眠混亂</option></select></td></tr>
      </table>
    </div>

    <div style="margin-top:10px;">
      <a href="訪視紀錄B單.html" style="border:1px solid #cfe0ff; background:#eef4ff; color:#2f6fed; border-radius:10px; padding:8px 16px; font-weight:700; text-decoration:none;">前往訪視紀錄B單 →</a>
    </div>
  </div>
  <script>
    const caseId = new URLSearchParams(window.location.search).get('caseId') || 'default';
    const SAVE_KEY = 'visitFormA_' + caseId;

    function saveForm() {
      const inputs = document.querySelectorAll('input:not([type=checkbox]), textarea, select');
      const checkboxes = document.querySelectorAll('input[type=checkbox]');
      const data = {
        inputs: Array.from(inputs).map(el => el.value),
        checkboxes: Array.from(checkboxes).map(el => el.checked)
      };
      localStorage.setItem(SAVE_KEY, JSON.stringify(data));
      const msg = document.getElementById('saveMsg');
      msg.style.display = 'inline';
      setTimeout(() => { msg.style.display = 'none'; }, 2000);
    }

    function loadForm() {
      // 從首頁個案資料帶入姓名與病歷號
      if (caseId !== 'default') {
        const cases = JSON.parse(localStorage.getItem('homeCases_v2') || '[]');
        const item = cases.find(c => c.id === caseId);
        if (item) {
          const allInputs = document.querySelectorAll('input:not([type=checkbox])');
          if (allInputs[0]) allInputs[0].value = item.name || '';
          if (allInputs[1]) allInputs[1].value = item.caseNo || '';
        }
        // 將 caseId 帶入 B單連結
        const linkB = document.querySelector('a[href^="訪視紀錄B單"]');
        if (linkB) linkB.href = '訪視紀錄B單.html?caseId=' + encodeURIComponent(caseId);
      }

      const saved = localStorage.getItem(SAVE_KEY);
      if (!saved) return;
      const data = JSON.parse(saved);
      const inputs = document.querySelectorAll('input:not([type=checkbox]), textarea, select');
      const checkboxes = document.querySelectorAll('input[type=checkbox]');
      if (data.inputs) data.inputs.forEach((val, i) => { if (inputs[i]) inputs[i].value = val; });
      if (data.checkboxes) data.checkboxes.forEach((val, i) => { if (checkboxes[i]) checkboxes[i].checked = val; });
    }

    window.addEventListener('DOMContentLoaded', loadForm);
  </script>
</body>
</html>
