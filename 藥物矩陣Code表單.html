<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />

  <style>
    * { box-sizing: border-box; font-family: "Microsoft JhengHei", Arial, sans-serif; }

    header p { margin:6px 0 0; opacity:.95; }
    .container { max-width: 1600px; margin: 24px auto; padding: 0 16px 40px; }

    .toolbar { display:flex; justify-content:space-between; gap:12px; align-items:center; flex-wrap:wrap; }
    .section-title { margin:0 0 16px; font-size:20px; border-left:5px solid #2f6fed; padding-left:10px; color:#28426e; }
    .meta { color:#667085; font-size:13px; }

    label { display:block; font-weight:700; margin-bottom:6px; color:#28426e; }
    input, select, textarea {
      width:100%; border:1px solid #cfd7e6; border-radius:10px; padding:10px 12px; font-size:14px; background:#fff;
    }
    button {
      border:none; border-radius:10px; padding:10px 16px; cursor:pointer;
      background:#2f6fed; color:#fff; font-size:14px; font-weight:700;
    }
    .btn-secondary { background:#eef4ff; color:#2f6fed; border:1px solid #cfe0ff; }
    .btn-danger { background:#d64545; }
    .table-wrap { overflow:auto; border:1px solid #dce5f3; border-radius:12px; }
    table { border-collapse:collapse; width:100%; min-width:1300px; }
    th, td { border:1px solid #dce5f3; padding:10px 8px; text-align:left; vertical-align:top; font-size:14px; }
    thead th { background:#f6f9ff; color:#28426e; font-weight:700; white-space:nowrap; }
    tbody tr:hover { background:#f8fbff; }
    tbody tr.active { background:#fff7da; }
    .pill {
      display:inline-flex; align-items:center; gap:8px; padding:6px 10px; border-radius:999px;
      background:#fff; border:1px solid #dbe5f5; color:#28426e; font-size:12px; font-weight:700;
    }
    .pill-wrap { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
    .empty { color:#667085; background:#fbfcfe; border:1px dashed #dbe5f5; border-radius:12px; padding:18px; text-align:center; }
    .subcard { background:#fbfcfe; border:1px solid #e3ebfa; border-radius:12px; padding:16px; }
    .hint { color:#667085; font-size:13px; margin-top:6px; }
    .right { text-align:right; }
    @media (max-width: 900px) { .grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>藥物矩陣Code表單－連動版 v1</h1>
    <p>依目前專案風格整理成可直接開啟的額外 Code 表單，可搜尋、勾選並帶入藥物記錄單。</p>
  </header>

  <div class="container">
    <div class="card">
      <div class="toolbar">
        <div>
          <div style="font-size:20px; font-weight:700; color:#28426e;">藥物矩陣資料庫</div>
          <div class="meta">可依藥名、作用、副作用搜尋，選取後帶入藥物記錄單。</div>
        </div>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <button type="button" class="btn-secondary" onclick="goHome()">回首頁</button>
          <button type="button" class="btn-secondary" onclick="goMedicationPage()">回藥物記錄單</button>
          <button type="button" class="btn-secondary" onclick="clearSelected()">清除勾選</button>
          <button type="button" onclick="importSelected()">帶入已勾選項目</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">查詢條件</h2>
      <div class="grid">
        <div>
          <label for="keywordInput">關鍵字</label>
          <input id="keywordInput" type="text" placeholder="可輸入藥名、劑量、頻率、作用、副作用" oninput="renderTable()">
        </div>
        <div>
          <label for="letterFilter">英文字首</label>
          <select id="letterFilter" onchange="renderTable()">
            <option value="">全部</option>
            <option>A</option><option>B</option><option>C</option><option>D</option><option>E</option>
            <option>F</option><option>G</option><option>H</option><option>I</option><option>J</option>
            <option>K</option><option>L</option><option>M</option><option>N</option><option>O</option>
            <option>P</option><option>Q</option><option>R</option><option>S</option><option>T</option>
            <option>U</option><option>V</option><option>W</option><option>X</option><option>Y</option><option>Z</option>
          </select>
        </div>
        <div>
          <label for="effectFilter">作用篩選</label>
          <input id="effectFilter" type="text" placeholder="例如 降血壓、化痰、抗生素" oninput="renderTable()">
        </div>
        <div>
          <label for="sideFilter">副作用篩選</label>
          <input id="sideFilter" type="text" placeholder="例如 暈眩、噁心、嗜睡" oninput="renderTable()">
        </div>
      </div>
      <div class="pill-wrap">
        <div class="pill">總筆數：<span id="totalCount">0</span></div>
        <div class="pill">目前顯示：<span id="filteredCount">0</span></div>
        <div class="pill">已勾選：<span id="selectedCount">0</span></div>
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">矩陣Code表</h2>
      <div class="subcard" style="margin-bottom:16px;">
        <div class="hint">操作方式：勾選你要的藥物 → 按「帶入已勾選項目」→ 會把資料存到 localStorage，並自動跳回藥物記錄單。</div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:60px;">勾選</th>
              <th style="width:80px;">Code</th>
              <th>藥物名稱 / 劑量 / 頻率</th>
              <th style="width:260px;">作用</th>
              <th style="width:320px;">副作用</th>
              <th style="width:90px;">帶入</th>
            </tr>
          </thead>
          <tbody id="matrixBody"></tbody>
        </table>
      </div>
    </div>
  </div>

    const SELECTED_KEY = "selectedDrugMatrixItems_v1";

    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name) || "";
    }

    function goHome() {
      window.location.href = "居家照護首頁.html";
    }

    function goMedicationPage() {
      const caseId = getQueryParam("caseId");
      window.location.href = caseId ? ("藥物使用紀錄單.html?caseId=" + encodeURIComponent(caseId)) : "藥物使用紀錄單.html";
    }

    function normalize(text) {
      return String(text || "").toLowerCase();
    }

    function getSelectedIds() {
      try {
        return JSON.parse(localStorage.getItem(SELECTED_KEY + "_ids") || "[]");
      } catch (e) {
        return [];
      }
    }

    function saveSelectedIds(ids) {
      localStorage.setItem(SELECTED_KEY + "_ids", JSON.stringify(ids));
      document.getElementById("selectedCount").textContent = ids.length;
    }

    function toggleSelect(id) {
      const ids = new Set(getSelectedIds());
      if (ids.has(id)) ids.delete(id); else ids.add(id);
      saveSelectedIds([...ids]);
      renderTable();
    }

    function clearSelected() {
      localStorage.removeItem(SELECTED_KEY + "_ids");
      localStorage.removeItem(SELECTED_KEY);
      saveSelectedIds([]);
      renderTable();
    }

    function singleImport(id) {
      const item = DRUG_DB.find(x => x.id === id);
      if (!item) return;
      localStorage.setItem(SELECTED_KEY, JSON.stringify([item]));
      goMedicationPage();
    }

    function importSelected() {
      const ids = getSelectedIds();
      const selected = DRUG_DB.filter(item => ids.includes(item.id));
      if (!selected.length) {
        alert("請先勾選至少一筆藥物");
        return;
      }
      localStorage.setItem(SELECTED_KEY, JSON.stringify(selected));
      goMedicationPage();
    }

    function renderTable() {
      const keyword = normalize(document.getElementById("keywordInput").value);
      const letter = normalize(document.getElementById("letterFilter").value);
      const effect = normalize(document.getElementById("effectFilter").value);
      const side = normalize(document.getElementById("sideFilter").value);
      const selectedIds = getSelectedIds();
      const body = document.getElementById("matrixBody");

      const filtered = DRUG_DB.filter(item => {
        const firstLetter = normalize((item.drugName || "").charAt(0));
        const hay = normalize(item.drugName + " " + item.effect + " " + item.sideEffect);
        if (keyword && !hay.includes(keyword)) return false;
        if (letter && firstLetter !== letter) return false;
        if (effect && !normalize(item.effect).includes(effect)) return false;
        if (side && !normalize(item.sideEffect).includes(side)) return false;
        return true;
      });

      document.getElementById("totalCount").textContent = DRUG_DB.length;
      document.getElementById("filteredCount").textContent = filtered.length;
      document.getElementById("selectedCount").textContent = selectedIds.length;

      if (!filtered.length) {
        body.innerHTML = '<tr><td colspan="6"><div class="empty">查無符合資料</div></td></tr>';
        return;
      }

      body.innerHTML = filtered.map(item => {
        const checked = selectedIds.includes(item.id);
        return `
          <tr class="${checked ? 'active' : ''}">
            <td><input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleSelect(${item.id})"></td>
            <td>D${String(item.id).padStart(4, '0')}</td>
            <td>${escapeHtml(item.drugName)}</td>
            <td>${escapeHtml(item.effect)}</td>
            <td>${escapeHtml(item.sideEffect)}</td>
            <td class="right"><button type="button" class="btn-secondary" onclick="singleImport(${item.id})">帶入</button></td>
          </tr>
        `;
      }).join('');
    }

    function escapeHtml(text) {
      return String(text || "").replace(/[&<>"]/g, function(ch) {
        return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[ch];
      });
    }

    renderTable();
  </script>
